name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build native macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas requests beautifulsoup4 lxml openpyxl pyinstaller

      - name: Build native SwiftUI app
        run: |
          ./script/build_and_run.sh --build-only

      - name: Archive app
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/OFUKB CBR PQ.app" "OFUKB-CBR-PQ-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: OFUKB-CBR-PQ-macOS
          path: OFUKB-CBR-PQ-macOS.zip

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas requests beautifulsoup4 lxml openpyxl pyinstaller

      - name: Build exe
        run: |
          python -m PyInstaller --noconsole --onedir --name "OFUKB CBR PQ" --icon assets/app_icon.ico --add-data "OFUKB_CBR_PQ_alt_parser.py;." --add-data "cbr_sqlite_export.py;." pq_excel_gui.py

      - name: Archive exe
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\OFUKB CBR PQ" -DestinationPath "OFUKB-CBR-PQ-Windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: OFUKB-CBR-PQ-Windows
          path: OFUKB-CBR-PQ-Windows.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          ls -la release-assets
          RELEASE_DATE="$(date -u +'%Y-%m-%d')"
          RELEASE_TAG="release-${RELEASE_DATE}-${GITHUB_RUN_NUMBER}"
          RELEASE_TITLE="${RELEASE_DATE}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE"
            gh release upload "$RELEASE_TAG" release-assets/*.zip --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/*.zip \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes "Автоматическая сборка GUI-приложения для macOS и Windows."
          fi
